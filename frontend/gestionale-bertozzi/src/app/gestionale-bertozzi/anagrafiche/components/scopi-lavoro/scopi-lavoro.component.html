<div class="grid">
  <div class="col-12">
    <app-titolo-pagina [titoloPagina]="'Gestione Scopi Lavoro'"></app-titolo-pagina>

    <div class="mb-5">
      <p-toolbar>
        <div class="p-toolbar-group-center"></div>
        <div class="p-toolbar-group-end">
          <p-button label="Crea nuovo scopo lavoro" icon="pi pi-plus" (click)="mostraFormCreazione()" />
        </div>
      </p-toolbar>
    </div>

    <!-- TABELLA SCOPI LAVORO -->
    @if(scopiList && scopiList.length > 0) {
    <p-table #dt1 [size]="'small'" [value]="scopiList" dataKey="id" [rows]="10" [loading]="loading" [rowHover]="true"
      styleClass="p-datatable-gridlines" [paginator]="true" [globalFilterFields]="['descrizione']"
      responsiveLayout="scroll" sortMode="multiple">
      <ng-template pTemplate="caption">
        <div class="flex justify-content-between flex-column sm:flex-row">
          <div class="flex">
            <button type="button" pButton pRipple icon="pi pi-file-excel" (click)="exportExcel()"
              class="p-button-success mr-2" pTooltip="XLS" tooltipPosition="bottom"></button>
          </div>
          <div class="flex">
            <p-iconfield iconPosition="left" class="ml-auto">
              <p-inputicon>
                <i class="pi pi-search"></i>
              </p-inputicon>
              <input pInputText type="text" #filter (input)="dt1.filterGlobal($event.target.value, 'contains')"
                placeholder="Cerca" />
            </p-iconfield>
          </div>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 8rem">
            <div class="flex justify-content-between align-items-center">
              Azioni
            </div>
          </th>
          <th pSortableColumn="id">
            <div class="flex justify-content-between align-items-center">
              ID
              <p-sortIcon field="id" />
            </div>
          </th>
          <th style="min-width: 12rem" pSortableColumn="descrizione">
            <div class="flex justify-content-between align-items-center">
              Descrizione
              <p-sortIcon field="descrizione" />
              <p-columnFilter type="text" field="descrizione" display="menu"
                placeholder="Cerca per descrizione"></p-columnFilter>
            </div>
          </th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-scopo>
        <tr>
          <td>
            <div class="flex gap-2">
              <button pButton label="" class="p-button-primary" icon="pi pi-pencil"
                (click)="mostraFormModifica($event, scopo)"></button>
              <button pButton label="" class="p-button-danger" icon="pi pi-trash"
                (click)="eliminaScopo($event, scopo)"></button>
            </div>
          </td>
          <td>
            <span class="image-text">{{ scopo.id }}</span>
          </td>
          <td>
            <span class="image-text">{{ scopo.descrizione }}</span>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="loadingbody">
        <tr>
          <td colspan="3">Scopi lavoro in caricamento...</td>
        </tr>
      </ng-template>
    </p-table>
    } @else if(!loading) {
    <p-message severity="info"
      text="Nessuno scopo lavoro presente. Clicca su 'Crea nuovo scopo lavoro' per iniziare." />
    }
  </div>
</div>

<!-- DIALOG CREAZIONE NUOVO SCOPO LAVORO -->
<p-dialog header="Dati nuovo scopo lavoro" [modal]="true" [(visible)]="showDialogCreazione"
  [style]="{ width: (isMobile$ | async) ? '95vw' : '50vw' }">
  <form [formGroup]="nuovoScopoForm" *ngIf="nuovoScopoForm">
    <div class="p-fluid">
      <div class="field grid">
        <label htmlFor="descrizione" class="col-12 mb-2 font-semibold">Descrizione</label>
        <div class="col-12">
          <input type="text" pInputText id="descrizione" class="w-full" autocomplete="off"
            formControlName="descrizione" />
          <small class="p-error" *ngIf="nuovoScopoForm.get('descrizione')?.invalid">
            Campo obbligatorio
          </small>
        </div>
      </div>
    </div>
    <div class="field grid mt-5">
      <div class="col-12 flex justify-content-end gap-2">
        <p-button label="Annulla" severity="secondary" icon="pi pi-times" (click)="showDialogCreazione = false" />
        <p-button label="Crea scopo lavoro" icon="pi pi-check" (click)="creaScopo()"
          [disabled]="!nuovoScopoForm.valid" />
      </div>
    </div>
  </form>
</p-dialog>

<!-- DIALOG MODIFICA SCOPO LAVORO -->
<p-dialog header="Modifica scopo lavoro" [modal]="true" [(visible)]="showDialogModifica"
  [style]="{ width: (isMobile$ | async) ? '95vw' : '50vw' }">
  <form [formGroup]="modificaScopoForm" *ngIf="modificaScopoForm">
    <div class="p-fluid">
      <div class="field grid">
        <label htmlFor="descrizioneModifica" class="col-12 mb-2 font-semibold">Descrizione</label>
        <div class="col-12">
          <input type="text" pInputText id="descrizioneModifica" class="w-full" autocomplete="off"
            formControlName="descrizione" />
          <small class="p-error" *ngIf="modificaScopoForm.get('descrizione')?.invalid">
            Campo obbligatorio
          </small>
        </div>
      </div>
    </div>
    <div class="field grid mt-5">
      <div class="col-12 flex justify-content-end gap-2">
        <p-button label="Annulla" severity="secondary" icon="pi pi-times" (click)="showDialogModifica = false" />
        <p-button label="Modifica scopo lavoro" icon="pi pi-check" (click)="modificaScopo()"
          [disabled]="!modificaScopoForm.valid" />
      </div>
    </div>
  </form>
</p-dialog>
